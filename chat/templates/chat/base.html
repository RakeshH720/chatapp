<!-- chat/templates/chat/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChatApp{% endblock %}</title>
    <style>
        /* ===== CSS RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222f;
            --border: #2e2e40;
            --accent: #7c6aff;
            --accent-glow: rgba(124, 106, 255, 0.3);
            --text: #e8e8f0;
            --text-dim: #7a7a9a;
            --online: #4ade80;
            --offline: #6b6b80;
            --danger: #ff5a5a;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* ===== NAV ===== */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }
        
        nav .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 16px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        nav .nav-links a:hover { color: var(--text); }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* ===== FORMS ===== */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            max-width: 420px;
            margin: 60px auto;
        }
        
        .form-card h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: var(--text);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            background: #6a58ee;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        
        .form-footer a { color: var(--accent); text-decoration: none; }
        
        /* ===== ERROR MESSAGES ===== */
        .errorlist {
            background: rgba(255, 90, 90, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            list-style: none;
            font-size: 0.85rem;
            color: var(--danger);
        }
        
        /* ===== STATUS DOTS ===== */
        .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: var(--online); box-shadow: 0 0 6px var(--online); }
        .status-dot.offline { background: var(--offline); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">💬 ChatApp</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span style="color: var(--text-dim); font-size:0.9rem;">Hi, <strong style="color:var(--text)">{{ user.username }}</strong></span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    
    {% block content %}{% endblock %}
</body>
</html>
